name: Build and push Docker image

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./RecursosBackend-Adoptme-main
          file: ./RecursosBackend-Adoptme-main/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/adoptme-api:latest
